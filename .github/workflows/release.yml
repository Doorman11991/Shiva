name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install transformers

      - name: Verify imports
        run: python -c "from brain import ChipBrain; print('OK')"

      - name: Smoke test
        run: |
          python -c "
          from brain import ChipBrain
          brain = ChipBrain(config={'save_every': 0, 'auto_restore': False}).boot()
          action = brain.tick('Release verification test.')
          assert action.shape[1] == 4
          print('Smoke test passed')
          "

  pypi:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # --skip-existing lets the job succeed if this exact version is already on PyPI
        run: twine upload --skip-existing dist/*

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # repository name must be fully lowercase for GHCR
          tags: |
            ghcr.io/doorman11991/chip:${{ steps.version.outputs.VERSION }}
            ghcr.io/doorman11991/chip:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: [pypi, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czf chip-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.chip_state' \
            --exclude='*.pyc' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: chip-*.tar.gz
          body_path: CHANGELOG.md
          generate_release_notes: true
